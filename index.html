<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>E 路Postcard</title>
  <link rel="stylesheet" href="styles.css?v=20260531-mobile">
  <link rel="icon" href="images/Yeah.ico" type="image/x-icon">
</head>
<body>
  <div class="container">
    <h1>E 路Postcard</h1>

    <form id="postcard-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="sender">寄信人</label>
          <input type="text" id="sender" class="input-box" placeholder="请输入寄信人" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="time">日期</label>
          <input type="text" id="time" class="input-box" placeholder="例如 2026.05.31">
        </div>
        <div class="form-group">
          <label for="receiver">收信人</label>
          <input type="text" id="receiver" class="input-box" placeholder="请输入收信人">
        </div>
        <div class="form-group">
          <label for="stampcode">邮政编码</label>
          <input type="text" id="stampcode" class="input-box" placeholder="6 位数字" inputmode="numeric" maxlength="6">
        </div>
      </div>

      <div class="form-group message-group">
        <label for="message">留言</label>
        <textarea id="message" class="input-box message" placeholder="请输入明信片留言，最多 50 字" maxlength="50"></textarea>
      </div>

      <div id="canvasContainer">
        <div class="canvas-container">
          <canvas id="imageCanvas" class="layer"></canvas>
          <canvas id="textCanvas" class="layer"></canvas>
          <canvas id="drawingCanvas" class="layer"></canvas>
        </div>
      </div>

      <div class="button-row">
        <div class="left-button">
          <button id="insert-image-btn" type="button">邮票</button>
          <button id="toggle-draw-btn" type="button">涂鸦</button>
          <button id="clear-draw-btn" type="button" hidden>清除</button>
        </div>
        <div class="right-buttons">
          <button id="downloadBtn" type="button" disabled>保存</button>
          <button id="share-btn" type="button">分享</button>
        </div>
        <input type="file" id="image-upload" accept="image/*" class="hidden-input">
      </div>
    </form>

    <div class="watermark">lili z llli</div>
  </div>

  <script src="script.js?v=20260531-mobile"></script>
</body>
</html>
